<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Scraper</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #0f0f0f;
    color: #fff;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    padding-bottom: 100px;
  }
  h1 { font-size: 20px; }
  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #222;
    color: #fff;
    font-size: 14px;
  }
  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: #ff0000;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .result {
    display: flex;
    gap: 12px;
    background: #1a1a1a;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
    align-items: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s ease;
  }
  .result:active { background: #262626; }
  .result.playing { background: #2a1414; border: 1px solid #ff0000; }
  .result img {
    width: 120px;
    height: 68px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .result-info { overflow: hidden; flex: 1; }
  .result-title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-id {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }
  .result-state {
    font-size: 12px;
    color: #ff0000;
    margin-top: 4px;
    display: none;
  }
  .result.loading .result-state { display: block; }
  .result.loading .result-state::before { content: '⏳ A carregar áudio...'; }
  .result.playing .result-state { display: block; color: #4caf50; }
  .result.playing .result-state::before { content: '▶ A tocar'; }
  .result.error .result-state { display: block; color: #ff5252; }
  .result.error .result-state::before { content: '⚠ Erro ao tocar'; }
  .status { color: #888; font-size: 13px; margin-bottom: 10px; }

  .player-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: #1a1a1a;
    border-top: 1px solid #333;
    padding: 10px 16px;
    display: none;
    align-items: center;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto;
    z-index: 100;
  }
  .player-bar.active { display: flex; }
  .player-thumb {
    width: 46px;
    height: 46px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .player-info { flex: 1; overflow: hidden; }
  .player-title {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-progress {
    width: 100%;
    height: 3px;
    background: #333;
    border-radius: 2px;
    margin-top: 6px;
    cursor: pointer;
    position: relative;
  }
  .player-progress-fill {
    height: 100%;
    background: #ff0000;
    border-radius: 2px;
    width: 0%;
  }
  .player-btn {
    background: #ff0000;
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .player-close {
    background: transparent;
    border: none;
    color: #888;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0 4px;
  }
</style>
</head>
<body>

<h1>🔍 YouTube Scraper</h1>

<div class="search-box">
  <input type="text" id="query" placeholder="Título e artista..." />
  <button id="btn" onclick="search()">Buscar</button>
</div>

<div class="status" id="status"></div>
<div id="results"></div>

<div class="player-bar" id="playerBar">
  <img class="player-thumb" id="playerThumb" src="" alt="">
  <div class="player-info">
    <div class="player-title" id="playerTitle"></div>
    <div class="player-progress" id="playerProgress">
      <div class="player-progress-fill" id="playerProgressFill"></div>
    </div>
  </div>
  <button class="player-btn" id="playerToggleBtn" onclick="togglePlayPause()">⏸</button>
  <button class="player-close" onclick="closePlayer()">✕</button>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
let currentVideoId = null;
let currentResultEl = null;

const audio = document.getElementById('audioPlayer');
const playerBar = document.getElementById('playerBar');
const playerThumb = document.getElementById('playerThumb');
const playerTitle = document.getElementById('playerTitle');
const playerToggleBtn = document.getElementById('playerToggleBtn');
const playerProgress = document.getElementById('playerProgress');
const playerProgressFill = document.getElementById('playerProgressFill');

async function search() {
  const query = document.getElementById('query').value.trim();
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  const btn = document.getElementById('btn');

  if (!query) return;

  btn.disabled = true;
  status.textContent = 'Buscando...';
  results.innerHTML = '';

  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(query));
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Erro desconhecido');

    if (data.results.length === 0) {
      status.textContent = 'Nenhum resultado encontrado.';
      btn.disabled = false;
      return;
    }

    status.textContent = data.results.length + ' resultados encontrados';

    data.results.forEach((item) => {
      const div = document.createElement('div');
      div.className = 'result';
      div.dataset.videoId = item.videoId;
      div.innerHTML = `
        <img src="${item.thumbnail}" />
        <div class="result-info">
          <div class="result-title">${item.title}</div>
          <div class="result-id">ID: ${item.videoId}</div>
          <div class="result-state"></div>
        </div>
      `;
      div.onclick = () => playAudio(item, div);
      results.appendChild(div);
    });

  } catch (err) {
    status.textContent = 'Erro: ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

function setResultState(el, state) {
  el.classList.remove('loading', 'playing', 'error');
  if (state) el.classList.add(state);
}

function playAudio(item, resultEl) {
  // Se já é o mesmo vídeo, só alterna play/pause
  if (currentVideoId === item.videoId && audio.src) {
    togglePlayPause();
    return;
  }

  if (currentResultEl) setResultState(currentResultEl, null);

  currentVideoId = item.videoId;
  currentResultEl = resultEl;
  setResultState(resultEl, 'loading');

  playerThumb.src = item.thumbnail;
  playerTitle.textContent = item.title;
  playerBar.classList.add('active');
  playerToggleBtn.textContent = '⏸';

  // Aponta diretamente para o endpoint de stream do servidor (mesma origem,
  // sem CORS, sem problema de IP-lock do googlevideo)
  audio.src = '/api/stream?videoId=' + encodeURIComponent(item.videoId) + '&t=' + Date.now();
  audio.load();
  audio.play().catch((err) => {
    // Alguns browsers rejeitam o play() imediato se ainda não há dados
    // suficientes; os eventos abaixo tratam do resto. Só logamos aqui.
    console.warn('play() rejeitado inicialmente:', err.message);
  });
}

function togglePlayPause() {
  if (!audio.src) return;
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
    playerToggleBtn.textContent = '▶';
    if (currentResultEl) setResultState(currentResultEl, null);
  }
}

function closePlayer() {
  audio.pause();
  audio.removeAttribute('src');
  audio.load();
  playerBar.classList.remove('active');
  if (currentResultEl) setResultState(currentResultEl, null);
  currentVideoId = null;
  currentResultEl = null;
}

audio.addEventListener('waiting', () => {
  if (currentResultEl) setResultState(currentResultEl, 'loading');
});

audio.addEventListener('playing', () => {
  playerToggleBtn.textContent = '⏸';
  if (currentResultEl) setResultState(currentResultEl, 'playing');
});

audio.addEventListener('pause', () => {
  if (!audio.ended) playerToggleBtn.textContent = '▶';
});

audio.addEventListener('error', () => {
  const status = document.getElementById('status');
  status.textContent = 'Erro ao tocar áudio. Tenta outro vídeo.';
  if (currentResultEl) setResultState(currentResultEl, 'error');
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration || !isFinite(audio.duration)) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  playerProgressFill.style.width = pct + '%';
});

audio.addEventListener('ended', () => {
  playerToggleBtn.textContent = '▶';
  if (currentResultEl) setResultState(currentResultEl, null);
});

playerProgress.addEventListener('click', (e) => {
  if (!audio.duration || !isFinite(audio.duration)) return;
  const rect = playerProgress.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

document.getElementById('query').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') search();
});
</script>

</body>
</html>
